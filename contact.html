      </ul>
    </div>

<main class="container my-5">
  <section class="p-4 p-md-5 rounded-4 bg-white shadow-sm">
    <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 fw-semibold mb-1">Contact / Feedback</h1>
        <p class="text-muted mb-0">We’d love to hear from you.</p>
      </div>
      <div class="d-flex gap-2">
        <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm" aria-label="X / Twitter"><i class="fab fa-x-twitter"></i></a>
        <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
      </div>
    </header>

    <section class="row g-4">
      <aside class="col-lg-5">
        <article class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <p class="mb-2"><strong>Email:</strong> <a href="mailto:info@ditswametsingfc.com?subject=Feedback%20for%20FC">info@ditswametsingfc.com</a></p>
            <button class="btn btn-dark mt-3" type="button">Give us feedback</button>
            <hr class="my-4">
            <address class="mb-0">
              <strong>Ditswametsing FC Stadium</strong><br>
              Moshupa, Botswana<br>
              Open: Mon–Fri, 8:30AM–5PM
            </address>
          </div>
        </article>
      </aside>

      <section class="col-lg-7">
        <form class="card border-0 shadow-sm p-3 p-md-4">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" class="form-control" type="text" placeholder="Your name" required>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" class="form-control" rows="5" placeholder="Write your message" required></textarea>
          </div>

          <div class="d-flex justify-content-end">
            <button class="btn btn-primary" type="submit">Send</button>
          </div>
        </form>
      </section>
    </section>
  </section>
</main>

<footer class="site-footer mt-5">
  <div class="container py-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center">
